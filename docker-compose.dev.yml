version: '3.8'

# Docker Compose для локальной разработки
# Порты 5436/6380 - как на боевом сервере
# (5432/6379 могут быть заняты другими проектами)

services:
  postgres:
    image: postgres:16-alpine
    container_name: hdd_fixer_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-hdd_fixer}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hdd_fixer_secret}
      POSTGRES_DB: ${DB_DATABASE:-hdd_fixer_db}
    ports:
      - '5436:5432'
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-hdd_fixer} -d ${DB_DATABASE:-hdd_fixer_db}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hdd_fixer_redis_dev
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redisdata_dev:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
  redisdata_dev:
